schemaVersion: 2.2.0
metadata:
  name: default-devfile
components:
  - name: development-tooling
    container:
      image: registry.redhat.io/devspaces/udi-rhel9:3.26.1
      env:
        - name: QUARKUS_HTTP_HOST
          value: 0.0.0.0
        - name: MAVEN_OPTS
          value: "-Dmaven.repo.local=/home/user/.m2/repository"
        - name: DOCKER_HOST
          value: unix:///tmp/podman.sock
        - name: TESTCONTAINERS_RYUK_DISABLED
          value: "true"
      memoryLimit: 5Gi
      cpuLimit: 2500m
      volumeMounts:
        - name: m2
          path: /home/user/.m2
      endpoints:
        - name: quarkus-dev
          targetPort: 8080
          exposure: public
          secure: false
          protocol: https
        - name: debug
          targetPort: 5005
          exposure: none
          secure: false
          protocol: tcp
        - name: tests
          targetPort: 8081
          exposure: none
          secure: false
          protocol: tcp
  - name: m2
    volume:
      size: 1G
commands:
  - id: package
    exec:
      label: "1. Package the application"
      component: development-tooling
      commandLine: "./mvnw package"
      group:
        kind: build
        isDefault: true
  - id: start-dev
    exec:
      label: "2. Start Development mode (Hot reload + debug)"
      component: development-tooling
      commandLine: "./mvnw compile quarkus:dev"
      group:
        kind: run
        isDefault: true
  - id: init-nested-containers
    exec:
      label: "Configure nested container support"
      component: development-tooling
      commandLine: |
        ME=$(whoami)
        START_ID=$(( $(id -u) + 1 ))
        RANGE=$(( 65536 - START_ID ))
        echo "${ME}:${START_ID}:${RANGE}" > /etc/subuid
        echo "${ME}:${START_ID}:${RANGE}" > /etc/subgid
        nohup podman system service --time=0 unix:///tmp/podman.sock > /dev/null 2>&1 &
      group:
        kind: build
  - id: init-continue
    exec:
      label: "Initialize Continue config"
      component: development-tooling
      workingDir: /home/user
      commandLine: |
        mkdir -p /home/user/.continue
        cat > /home/user/.continue/config.yaml << EOF
        name: Continue Config
        version: 0.0.1
        models:
          - name: LiteMaaS (qwen3-14b)
            provider: vllm
            model: qwen3-14b
            apiKey: ${LLM_API_KEY}
            apiBase: ${LLM_BASE_URL}
            roles:
              - chat
        EOF
      group:
        kind: build
events:
  postStart:
    - init-nested-containers
    - init-continue
