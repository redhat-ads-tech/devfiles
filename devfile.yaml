schemaVersion: 2.2.0
metadata:
  name: default-devfile
components:
  - name: development-tooling
    container:
      image: registry.redhat.io/devspaces/udi-rhel9:3.26.1
      env:
        - name: QUARKUS_HTTP_HOST
          value: 0.0.0.0
        - name: MAVEN_OPTS
          value: "-Dmaven.repo.local=/home/user/.m2/repository"
        - name: DOCKER_HOST
          value: unix:///tmp/podman.sock
        - name: TESTCONTAINERS_RYUK_DISABLED
          value: "true"
        # Workaround: the DevWorkspace operator should inject HOST_USERS=false
        # when hostUsers: false is set in the operator config, but doesn't.
        # The UDI entrypoint uses this to fix /etc/subuid for nested containers.
        - name: HOST_USERS
          value: "false"
        - name: QUARKUS_ANALYTICS_DISABLED
          value: "true"
        - name: CLAUDE_CODE_DISABLE_EXPERIMENTAL_BETAS
          value: "1"
      memoryLimit: 5Gi
      cpuLimit: 2500m
      volumeMounts:
        - name: m2
          path: /home/user/.m2
      endpoints:
        - name: quarkus-dev
          targetPort: 8080
          exposure: public
          secure: false
          protocol: https
        - name: debug
          targetPort: 5005
          exposure: none
          secure: false
          protocol: tcp
        - name: tests
          targetPort: 8081
          exposure: none
          secure: false
          protocol: tcp
  - name: m2
    volume:
      size: 1G
commands:
  - id: package
    exec:
      label: "1. Package the application"
      component: development-tooling
      commandLine: "./mvnw package"
      group:
        kind: build
        isDefault: true
  - id: start-dev
    exec:
      label: "2. Start Development mode (Hot reload + debug)"
      component: development-tooling
      commandLine: "./mvnw compile quarkus:dev -Dquarkus.analytics.disabled=true"
      group:
        kind: run
        isDefault: true
  - id: init-podman-socket
    exec:
      label: "Start podman socket"
      component: development-tooling
      commandLine: |
        # Use podman.orig directly because the UDI entrypoint symlinks podman
        # to /home/tooling/.local/bin/, which isn't on PATH during postStart.
        /usr/bin/podman.orig system service --time=0 unix:///tmp/podman.sock &
        sleep 2
        if [ -S /tmp/podman.sock ]; then
          echo "Podman socket ready"
        else
          echo "WARNING: Podman socket not created"
        fi
      group:
        kind: build
  - id: init-continue
    exec:
      label: "Initialize Continue config"
      component: development-tooling
      commandLine: |
        # The config.yaml is mounted as a secret at .continue-config/ by the
        # DevWorkspace operator. We copy it rather than mounting directly into
        # .continue/ because secret mounts make the directory root-owned and
        # read-only, preventing Continue from writing session/index files.
        mkdir -p /home/user/.continue
        cp /home/user/.continue-config/config.yaml /home/user/.continue/config.yaml
      group:
        kind: build
  - id: init-claude
    exec:
      label: "Install Claude CLI and config"
      component: development-tooling
      commandLine: |
        # Install the Claude CLI
        curl -fsSL https://claude.ai/install.sh -o /tmp/claude-install.sh
        chmod +x /tmp/claude-install.sh
        /tmp/claude-install.sh
        # Copy the pre-configured .claude.json so onboarding is skipped.
        # Mounted as a secret at .claude-config/ (read-only), copied to
        # /home/user/ so Claude CLI can update it at runtime.
        cp /home/user/.claude-config/.claude.json /home/user/.claude.json
      group:
        kind: build
  - id: configure-settings
    exec:
      label: "Configure editor settings"
      component: development-tooling
      commandLine: |
        # Inject extension settings into che-code's machine settings:
        # - Roo auto-import path for the mounted config secret
        # - Claude Code terminal mode for DevSpaces compatibility
        jq '. + {"roo-cline.autoImportSettingsPath": "/home/user/.roo-config/roo-code-settings.json", "claudeCode.useTerminal": true}' \
          /checode/remote/data/Machine/settings.json > /tmp/settings.json && \
          mv /tmp/settings.json /checode/remote/data/Machine/settings.json
      group:
        kind: build
events:
  postStart:
    - init-podman-socket
    - init-continue
    - init-claude
    - configure-settings
